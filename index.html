<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --color-background-primary:#ffffff;
  --color-background-secondary:#f3f4f6;
  --color-background-tertiary:#e5e7eb;
  --color-border-tertiary:#d1d5db;
  --color-border-secondary:#e5e7eb;
  --color-text-primary:#111827;
  --color-text-secondary:#6b7280;
  --font-sans:'Inter',system-ui,-apple-system,sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{
    --color-background-primary:#1c1c1e;
    --color-background-secondary:#2c2c2e;
    --color-background-tertiary:#3a3a3c;
    --color-border-tertiary:#48484a;
    --color-border-secondary:#3a3a3c;
    --color-text-primary:#f2f2f7;
    --color-text-secondary:#aeaeb2;
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--color-background-tertiary);touch-action:manipulation;-webkit-text-size-adjust:100%;height:100dvh;overflow:hidden;overscroll-behavior:none;}
#app{display:flex;flex-direction:column;height:100dvh;min-height:0;}
#toolbar{background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);padding:8px 10px;padding-left:max(10px,env(safe-area-inset-left));padding-right:max(10px,env(safe-area-inset-right));display:flex;align-items:center;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-shrink:0}
#toolbar::-webkit-scrollbar{display:none}
.tb-btn{background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--color-text-primary);cursor:pointer;white-space:nowrap;min-height:44px;flex-shrink:0;-webkit-tap-highlight-color:transparent;font-family:var(--font-sans);}
.tb-btn.primary{background:#4f46e5;color:#fff;border-color:#4f46e5}
.tb-btn:active{opacity:.7}
#slide-area{flex:1;overflow:hidden;display:flex;flex-direction:column;padding:10px;gap:8px;min-height:0;background:var(--color-background-tertiary);}
#slide-preview{flex:1;border-radius:12px;overflow:hidden;position:relative;border:2px solid transparent;min-height:0}
#slide-canvas{width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:16px;overflow:hidden;position:relative;background:#1e1b4b;color:#e0e7ff;}
#thumbs-row{display:flex;gap:6px;overflow-x:auto;padding:2px 0;flex-shrink:0;min-height:56px;-webkit-overflow-scrolling:touch;align-items:center;}
#thumbs-row::-webkit-scrollbar{display:none}
.thumb{min-width:68px;width:68px;height:48px;border-radius:6px;border:1.5px solid var(--color-border-tertiary);flex-shrink:0;overflow:hidden;position:relative;-webkit-tap-highlight-color:transparent;cursor:pointer;}
.thumb.active{border-color:#4f46e5;border-width:2px}
.thumb .tnum{position:absolute;bottom:2px;left:3px;font-size:8px;opacity:0.7;font-weight:600;}
#edit-panel{background:var(--color-background-primary);border-top:0.5px solid var(--color-border-tertiary);padding:10px 10px calc(10px + env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:8px;overflow-y:auto;max-height:42vh;flex-shrink:0;-webkit-overflow-scrolling:touch}
.ep-row{display:flex;gap:8px;align-items:flex-start;padding-top:2px;}
.ep-label{font-size:11px;color:var(--color-text-secondary);min-width:46px;padding-top:12px;flex-shrink:0;}


input[type=text],textarea{
  width:100%;
  border:1px solid var(--color-border-tertiary);
  border-radius:10px;
  padding:10px 12px;
  font-size:16px;
  background:var(--color-background-secondary);
  color:var(--color-text-primary);
  box-shadow:inset 0 1px 2px rgba(0,0,0,0.05);
  -webkit-appearance:none;
  appearance:none;
}
input[type=text]::placeholder,textarea::placeholder{
  color:var(--color-text-secondary);
  opacity:1;
}
input[type=text]:focus,textarea:focus{
  outline:none;
  border-color:#4f46e5;
  box-shadow:0 0 0 2px rgba(79,70,229,0.15);
}


textarea{resize:none;height:80px;overflow-y:auto;}
.color-row{display:flex;gap:8px;flex-wrap:wrap}
.color-swatch{width:36px;height:36px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.color-swatch.active{border-color:var(--color-text-primary)}
#present-overlay{display:none;position:fixed;inset:0;z-index:9999;flex-direction:column}
#present-overlay.show{display:flex}
#present-slide{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:24px;overflow:hidden;position:relative}
#present-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom));background:rgba(0,0,0,.4);flex-shrink:0;}
.pnav-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:8px;padding:12px 20px;font-size:18px;color:#fff;min-height:48px;min-width:48px;-webkit-tap-highlight-color:transparent}
#present-counter{font-size:13px;color:rgba(255,255,255,.7)}
#file-input,#file-input-2{display:none;position:absolute;width:1px;height:1px;opacity:0;}

/* ── Responzivní – telefon (portrait) ── */
@media(max-width:480px){
  #toolbar{gap:4px;padding:6px 8px;}
  .tb-btn{padding:7px 10px;font-size:12px;min-height:40px;}
  #slide-area{padding:6px;gap:6px;}
  #thumbs-row{min-height:50px;}
  .thumb{min-width:58px;width:58px;height:42px;}
  #edit-panel{max-height:44vh;padding:8px 8px calc(8px + env(safe-area-inset-bottom));}
  .ep-label{min-width:40px;font-size:10px;}
  input[type=text],textarea{font-size:15px;padding:9px 10px;}
  textarea{height:70px;}
  .color-swatch{width:30px;height:30px;}
}

/* ── Velmi malé telefony ── */
@media(max-width:360px){
  .tb-btn{padding:6px 8px;font-size:11px;}
  #edit-panel{max-height:46vh;}
}
</style>

<div id="app">
  <div id="toolbar">
    <button class="tb-btn" onclick="addSlide()">+ snímek</button>
    <button class="tb-btn" onclick="duplicateSlide()">kopie</button>
    <button class="tb-btn primary" onclick="startPresent()">&#9654; prezentuj</button>
    <button class="tb-btn" id="pdf-btn" onclick="exportPDF()">&#8595; PDF</button>
  </div>
  <div id="slide-area">
    <div id="slide-preview">
      <div id="slide-canvas"></div>
    </div>
    <div id="thumbs-row"></div>
  </div>
  <div id="edit-panel">
    <div class="ep-row">
      <span class="ep-label">Nadpis</span>
      <input type="text" id="inp-title" placeholder="Hlavní nadpis" oninput="updateCurrent()">
    </div>
    <div class="ep-row">
      <span class="ep-label">Text</span>
      <textarea id="inp-body" placeholder="Popis / obsah snímku" oninput="updateCurrent()"></textarea>
    </div>

    <div class="ep-row">
      <span class="ep-label">Pozadí</span>
      <div class="color-row" id="color-row"></div>
    </div>
  </div>
</div>

<div id="present-overlay">
  <div id="present-slide"></div>
  <div id="present-nav">
    <button class="pnav-btn" onclick="presNav(-1)">&#8249;</button>
    <span id="present-counter"></span>
    <button class="pnav-btn" onclick="presNav(1)">&#8250;</button>
    <button class="pnav-btn" onclick="endPresent()" style="margin-left:10px;font-size:12px;padding:10px 12px">&#10005;</button>
  </div>
</div>

<input type="file" id="file-input" accept="image/*">
<input type="file" id="file-input-2" accept="image/*">

<script>
const COLORS=[
  {bg:'#1e1b4b',text:'#e0e7ff'},{bg:'#0f172a',text:'#e2e8f0'},
  {bg:'#14532d',text:'#dcfce7'},{bg:'#7c2d12',text:'#ffedd5'},
  {bg:'#831843',text:'#fce7f3'},{bg:'#1e3a5f',text:'#dbeafe'},
  {bg:'#f8fafc',text:'#0f172a'},{bg:'#18181b',text:'#f4f4f5'},
];

let slides=[
  {title:'Fotožurnalistika a etika',body:'Seminární prezentace',bg:'#1e1b4b',text:'#e0e7ff',img:null},
  {title:'Fotografie',body:'Vlož fotografii z oblasti fotožurnalistiky, která je eticky diskutabilní.\n(např. Napalm Girl, The Falling Man, Vulture and the Little Girl, Tank Man, Alan Kurdi, Execution of Nguyễn Văn Lém)\n\nZdroj: Google — články a zpravodajství',bg:'#1e3a5f',text:'#dbeafe',img:null},
  {title:'Autor fotografie',body:'Kdo fotografii pořídil?\n\nMěla jeho fotografie pozitivní nebo negativní dopad na jeho život?\n\nNějakou zajímavost o něm.',bg:'#1e3a5f',text:'#dbeafe',img:null},
  {title:'Kontext',body:'Co fotografie zachycuje?\n\nZa jakých okolností vznikla?',bg:'#14532d',text:'#dcfce7',img:null},
  {title:'Význam a dopad',body:'Jaký měla fotografie vliv na veřejnost?\n\nVyvolala nějakou reakci?\n(diskuzi, změnu názoru, pomoc apod.)',bg:'#7c2d12',text:'#ffedd5',img:null},
  {title:'Etické zhodnocení — vlastní názor, ne názor od AI',body:'Je podle tebe správné tuto fotografii zveřejnit? (ANO / NE)\n\nProč ano / proč ne? (min. 5 vět)\n\nJaké etické problémy fotografie vyvolává?\n(soukromí, důstojnost, manipulace, šokování veřejnosti…)',bg:'#831843',text:'#fce7f3',img:null},
  {title:'Závěr',body:'Co je podle tebe fotožurnalistika?\n\nProč je důležitá etika při zveřejňování fotografií?\n\nMěla by mít média nějaké hranice? Jaké?',bg:'#18181b',text:'#f4f4f5',img:null},
];

let cur=0,presIdx=0;

function buildColorRow(){
  const row=document.getElementById('color-row');
  row.innerHTML='';
  COLORS.forEach((c,i)=>{
    const s=document.createElement('div');
    s.className='color-swatch';
    s.style.background=c.bg;
    s.onclick=()=>setColor(i);
    row.appendChild(s);
  });
}

function setColor(i){
  slides[cur].bg=COLORS[i].bg;
  slides[cur].text=COLORS[i].text;
  document.querySelectorAll('.color-swatch').forEach((s,j)=>s.classList.toggle('active',j===i));
  render();
}

function renderSlide(slide,el,small,slideIdx){
  el.style.background=slide.bg;
  el.style.color=slide.text;
  el.style.justifyContent='center';
  el.innerHTML='';

  const isCenter = slideIdx===0;
  el.style.alignItems = isCenter?'center':'flex-start';

  // --- DEKORATIVNÍ POZADÍ (subtle pattern) ---
  if(!small){
    const deco=document.createElement('div');
    deco.style.cssText=`
      position:absolute;inset:0;pointer-events:none;z-index:0;overflow:hidden;
    `;
    // Velký kruh v rohu (dekorace)
    deco.innerHTML=`<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0">
      <circle cx="${isCenter?'50%':'92%'}" cy="${isCenter?'110%':'50%'}" r="${isCenter?'55%':'45%'}" fill="rgba(255,255,255,0.04)"/>
      <circle cx="${isCenter?'50%':'88%'}" cy="${isCenter?'110%':'50%'}" r="${isCenter?'42%':'32%'}" fill="rgba(255,255,255,0.03)"/>
    </svg>`;
    el.appendChild(deco);
  }

  // --- ČÍSLO SNÍMKU (pravý horní roh, jen ne small, ne slide 0) ---
  if(!small && slideIdx>0){
    const num=document.createElement('div');
    num.style.cssText=`
      position:absolute;top:10px;right:14px;
      font-family:'Inter',sans-serif;font-size:clamp(8px,1.4vw,11px);
      font-weight:500;letter-spacing:.06em;opacity:0.35;z-index:2;
    `;
    num.textContent=String(slideIdx+1).padStart(2,'0');
    el.appendChild(num);
  }

  // --- FOTO OBLAST (slide 1 = fotografie, slide 2 = autor) ---
  if (slideIdx === 1 || slideIdx === 2) {
    const inputId = slideIdx === 2 ? 'file-input-2' : 'file-input';
    const isPortrait = slideIdx === 2;
    if (slide.img && !small) {
      const wrap = document.createElement('div');
      wrap.style.cssText = `
        position: absolute;right: 5%;top: 50%;transform: translateY(-50%);
        width: 40%;max-width: 280px;aspect-ratio: ${isPortrait ? '3/4' : '4/3'};
        border-radius: 10px;overflow: hidden;pointer-events: none;user-select: none;
        box-shadow: 0 8px 32px rgba(0,0,0,0.35);
      `;
      const im = document.createElement('img');
      im.src = slide.img;
      im.style.cssText = 'display:block;width:100%;height:100%;object-fit:cover;pointer-events:none;';
      wrap.appendChild(im);
      el.appendChild(wrap);
    } else if (!small) {
      const zone = document.createElement('div');
      zone.style.cssText = `
        position: absolute;right: 5%;top: 50%;transform: translateY(-50%);
        width: 40%;max-width: 280px;aspect-ratio: ${isPortrait ? '3/4' : '4/3'};
        border: 1.5px dashed rgba(255,255,255,0.3);border-radius: 10px;
        display: flex;flex-direction: column;align-items: center;justify-content: center;gap: 6px;
        cursor: pointer;background: rgba(255,255,255,0.05);z-index: 2;
      `;
      const icon = document.createElement('div');
      icon.textContent = isPortrait ? '🧑‍🎨' : '📷';
      icon.style.cssText = 'font-size:clamp(18px,3.5vw,28px);';
      const label = document.createElement('div');
      label.textContent = isPortrait ? 'Přidej foto autora' : 'Přidej fotografii';
      label.style.cssText = 'font-family:Inter,sans-serif;font-size:clamp(8px,1.6vw,12px);opacity:0.6;text-align:center;padding:0 8px;font-weight:400;';
      zone.appendChild(icon);zone.appendChild(label);
      // Use a <label> element linked to the file input — this is the only reliable way to trigger file picker on iOS/Android
      const lbl = document.createElement('label');
      lbl.htmlFor = inputId;
      lbl.style.cssText = 'position:absolute;inset:0;cursor:pointer;z-index:3;-webkit-tap-highlight-color:transparent;';
      lbl.setAttribute('aria-label', isPortrait ? 'Přidej foto autora' : 'Přidej fotografii');
      zone.appendChild(lbl);
      el.appendChild(zone);
    } else if (slide.img && small) {
      const im = document.createElement('img');
      im.src = slide.img;
      im.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.3;pointer-events:none;';
      el.appendChild(im);
    }
  }

  // --- HLAVNÍ OBSAH ---
  const pad = small ? '3px 5px' : (isCenter ? '0 8%' : '0 6%');
  // slide 1 a 2 mají foto vpravo → text jen v levé části
  const w = (!small && (slideIdx===1 || slideIdx===2)) ? '54%' : '100%';

  const tw=document.createElement('div');
  tw.style.cssText=`position:relative;z-index:1;width:${w};text-align:${isCenter?'center':'left'};${small?'':'padding:'+pad};`;

  if(isCenter && !small){
    // ÚVODNÍ SLIDE — velký centrovaný nadpis + dekorativní čára
    if(slide.title){
      const h=document.createElement('div');
      h.style.cssText=`
        font-family:'Playfair Display',Georgia,serif;
        font-size:clamp(14px,3.5vw,26px);font-weight:700;
        line-height:1.1;letter-spacing:-.01em;margin-bottom:10px;
      `;
      h.textContent=slide.title;
      tw.appendChild(h);
    }
    // Dekorativní linka pod nadpisem
    const line=document.createElement('div');
    line.style.cssText=`
      width:40px;height:2px;background:currentColor;opacity:0.4;
      margin:0 auto 10px;border-radius:2px;
    `;
    tw.appendChild(line);
    if(slide.body){
      const p=document.createElement('div');
      p.style.cssText=`
        font-family:'Inter',sans-serif;font-size:clamp(9px,1.8vw,13px);
        opacity:0.6;letter-spacing:.08em;text-transform:uppercase;font-weight:400;
      `;
      p.textContent=slide.body;
      tw.appendChild(p);
    }
  } else if(!small) {
    // OBSAHOVÝ SLIDE — levý layout s nadpisem, linkou, textem
    if(slide.title){
      const h=document.createElement('div');
      h.style.cssText=`
        font-family:'Playfair Display',Georgia,serif;
        font-size:clamp(12px,2.8vw,20px);font-weight:700;
        line-height:1.15;margin-bottom:8px;letter-spacing:-.01em;
      `;
      h.textContent=slide.title;
      tw.appendChild(h);
    }
    // Oddělovač nadpisu od textu
    const sep=document.createElement('div');
    sep.style.cssText=`
      display:flex;align-items:center;gap:8px;margin-bottom:10px;
    `;
    const sepLine=document.createElement('div');
    sepLine.style.cssText=`height:1px;width:32px;background:currentColor;opacity:0.35;flex-shrink:0;`;
    const sepDot=document.createElement('div');
    sepDot.style.cssText=`width:4px;height:4px;border-radius:50%;background:currentColor;opacity:0.35;flex-shrink:0;`;
    sep.appendChild(sepLine);sep.appendChild(sepDot);
    tw.appendChild(sep);

    if(slide.body){
      // Rozdělit body na odstavce, každý zvlášť
      const paras=slide.body.split(/\n\n+/);
      paras.forEach((para,pi)=>{
        if(!para.trim())return;
        const lines=para.split('\n');
        const isQuestion=lines[0].trim().endsWith('?');
        const pEl=document.createElement('div');
        pEl.style.cssText=`
          font-family:'Inter',sans-serif;
          font-size:clamp(8px,1.6vw,12px);
          line-height:1.65;font-weight:${isQuestion?'500':'300'};
          opacity:${isQuestion?'0.95':'0.82'};
          margin-bottom:${pi<paras.length-1?'8px':'0'};
          white-space:pre-wrap;
        `;
        pEl.textContent=para.trim();
        tw.appendChild(pEl);
      });
    }
  } else {
    // SMALL (thumbnail)
    if(slide.title){
      const h=document.createElement('div');
      h.style.cssText=`font-size:6px;font-weight:600;font-family:Georgia,serif;color:${slide.text};word-break:break-word;overflow:hidden;max-height:14px;margin-bottom:2px;`;
      h.textContent=slide.title;tw.appendChild(h);
    }
    if(slide.body){
      const p=document.createElement('div');
      p.style.cssText=`font-size:4px;opacity:.65;overflow:hidden;max-height:18px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;`;
      p.textContent=slide.body.replace(/\n/g,' ');tw.appendChild(p);
    }
  }

  el.appendChild(tw);
}


function renderThumbs(){
  const row=document.getElementById('thumbs-row');
  row.innerHTML='';
  slides.forEach((s,i)=>{
    const t=document.createElement('div');
    t.className='thumb'+(i===cur?' active':'');
    t.style.background=s.bg;
    if(s.img){
      const ti=document.createElement('img');
      ti.src=s.img;
      ti.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.35';
      t.appendChild(ti);
    }
    const mini=document.createElement('div');
    mini.style.cssText='position:relative;z-index:1;padding:2px 4px;width:100%;text-align:'+(i===0?'center':'left');
    if(s.title){
      const h=document.createElement('div');
      h.style.cssText='font-size:6px;font-weight:500;color:'+s.text+';word-break:break-word;overflow:hidden;max-height:24px';
      h.textContent=s.title;
      mini.appendChild(h);
    }
    t.appendChild(mini);
    const num=document.createElement('div');
    num.className='tnum';num.style.color=s.text;num.textContent=i+1;
    t.appendChild(num);
    t.onclick=()=>selectSlide(i);
    row.appendChild(t);
  });
}


function syncInputs(){
  const s=slides[cur];
  document.getElementById('inp-title').value=s.title||'';
  const ta=document.getElementById('inp-body');
  ta.value=s.body||'';
  const cidx=COLORS.findIndex(c=>c.bg===s.bg);
  document.querySelectorAll('.color-swatch').forEach((sw,j)=>sw.classList.toggle('active',j===cidx));
}

function render(){
  renderSlide(slides[cur],document.getElementById('slide-canvas'),false,cur);
  renderThumbs();
  syncInputs();
}

function updateCurrent(){
  slides[cur].title=document.getElementById('inp-title').value;
  slides[cur].body=document.getElementById('inp-body').value;
  render();
}

function selectSlide(i){cur=i;render();}

function addSlide(){
  const prev=slides[cur];
  slides.splice(cur+1,0,{title:'Nový snímek',body:'',bg:prev.bg,text:prev.text,img:null});
  cur++;render();
}

function duplicateSlide(){
  const s=slides[cur];
  slides.splice(cur+1,0,{...s});
  cur++;render();
}

function deleteSlide(i){
  if(slides.length<=1)return;
  slides.splice(i,1);
  if(cur>=slides.length)cur=slides.length-1;
  render();
}

document.getElementById('file-input').addEventListener('change',function(){
  const file=this.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{slides[1].img=e.target.result;render();};
  reader.readAsDataURL(file);this.value='';
});

document.getElementById('file-input-2').addEventListener('change',function(){
  const file=this.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{slides[2].img=e.target.result;render();};
  reader.readAsDataURL(file);this.value='';
});

function startPresent(){presIdx=cur;renderPresent();document.getElementById('present-overlay').classList.add('show');}
function endPresent(){document.getElementById('present-overlay').classList.remove('show');}
function presNav(d){presIdx=Math.max(0,Math.min(slides.length-1,presIdx+d));renderPresent();}

function renderPresent(){
  const s=slides[presIdx];
  const el=document.getElementById('present-slide');
  el.style.background=s.bg;el.style.color=s.text;
  const isCenter=presIdx===0;
  el.style.alignItems=isCenter?'center':'flex-start';
  el.style.textAlign=isCenter?'center':'left';
  el.innerHTML='';

  // Dekorativní kruhy na pozadí
  const deco=document.createElement('div');
  deco.style.cssText='position:absolute;inset:0;pointer-events:none;z-index:0;overflow:hidden;';
  deco.innerHTML=`<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0">
    <circle cx="${isCenter?'50%':'95%'}" cy="${isCenter?'115%':'50%'}" r="${isCenter?'60%':'50%'}" fill="rgba(255,255,255,0.04)"/>
    <circle cx="${isCenter?'50%':'90%'}" cy="${isCenter?'115%':'50%'}" r="${isCenter?'46%':'36%'}" fill="rgba(255,255,255,0.03)"/>
  </svg>`;
  el.appendChild(deco);

  // Číslo snímku
  if(presIdx>0){
    const num=document.createElement('div');
    num.style.cssText='position:absolute;top:18px;right:22px;font-family:Inter,sans-serif;font-size:13px;font-weight:500;letter-spacing:.06em;opacity:0.3;z-index:2;';
    num.textContent=String(presIdx+1).padStart(2,'0');
    el.appendChild(num);
  }

  // Foto na slide 1 (fotografie) a slide 2 (autor)
  if(s.img && (presIdx===1 || presIdx===2)){
    const isPortrait = presIdx===2;
    const wrap=document.createElement('div');
    wrap.style.cssText=`position:absolute;right:5%;top:50%;transform:translateY(-50%);width:40%;max-width:440px;aspect-ratio:${isPortrait?'3/4':'4/3'};pointer-events:none;border-radius:12px;overflow:hidden;box-shadow:0 16px 48px rgba(0,0,0,0.4);`;
    const im=document.createElement('img');im.src=s.img;
    im.style.cssText='display:block;width:100%;height:100%;object-fit:cover;pointer-events:none';
    wrap.appendChild(im);el.appendChild(wrap);
  }

  const textW = (!isCenter && (presIdx===1||presIdx===2) && s.img) ? '54%' : '100%';
  const tw=document.createElement('div');
  tw.style.cssText=`position:relative;z-index:1;width:${textW};padding:0 ${isCenter?'8%':'7%'};text-align:${isCenter?'center':'left'};`;

  if(isCenter){
    if(s.title){
      const h=document.createElement('div');
      h.style.cssText='font-family:"Playfair Display",Georgia,serif;font-size:clamp(24px,5.5vw,58px);font-weight:700;line-height:1.08;margin-bottom:16px;letter-spacing:-.02em;';
      h.textContent=s.title;tw.appendChild(h);
    }
    const line=document.createElement('div');
    line.style.cssText='width:48px;height:2px;background:currentColor;opacity:0.38;margin:0 auto 16px;border-radius:2px;';
    tw.appendChild(line);
    if(s.body){
      const p=document.createElement('div');
      p.style.cssText='font-family:Inter,sans-serif;font-size:clamp(13px,2vw,18px);opacity:0.55;letter-spacing:.1em;text-transform:uppercase;font-weight:400;';
      p.textContent=s.body;tw.appendChild(p);
    }
  } else {
    if(s.title){
      const h=document.createElement('div');
      h.style.cssText='font-family:"Playfair Display",Georgia,serif;font-size:clamp(20px,4.5vw,46px);font-weight:700;line-height:1.1;margin-bottom:14px;letter-spacing:-.02em;';
      h.textContent=s.title;tw.appendChild(h);
    }
    const sep=document.createElement('div');
    sep.style.cssText='display:flex;align-items:center;gap:10px;margin-bottom:18px;';
    const sepLine=document.createElement('div');sepLine.style.cssText='height:1px;width:40px;background:currentColor;opacity:0.3;';
    const sepDot=document.createElement('div');sepDot.style.cssText='width:5px;height:5px;border-radius:50%;background:currentColor;opacity:0.3;';
    sep.appendChild(sepLine);sep.appendChild(sepDot);tw.appendChild(sep);
    if(s.body){
      const paras=s.body.split(/\n\n+/);
      paras.forEach((para,pi)=>{
        if(!para.trim())return;
        const isQ=para.trim().split('\n')[0].endsWith('?');
        const p=document.createElement('div');
        p.style.cssText=`font-family:Inter,sans-serif;font-size:clamp(13px,2.2vw,20px);line-height:1.65;font-weight:${isQ?'500':'300'};opacity:${isQ?'.92':'.78'};margin-bottom:${pi<paras.length-1?'14px':'0'};white-space:pre-wrap;`;
        p.textContent=para.trim();tw.appendChild(p);
      });
    }
  }
  el.appendChild(tw);
  document.getElementById('present-counter').textContent=(presIdx+1)+' / '+slides.length;
}

document.addEventListener('keydown',e=>{
  if(!document.getElementById('present-overlay').classList.contains('show'))return;
  if(e.key==='ArrowRight'||e.key==='ArrowDown')presNav(1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')presNav(-1);
  if(e.key==='Escape')endPresent();
});

let txS=0;
document.getElementById('present-slide').addEventListener('touchstart',e=>txS=e.touches[0].clientX,{passive:true});
document.getElementById('present-slide').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-txS;
  if(Math.abs(dx)>40)presNav(dx<0?1:-1);
},{passive:true});

buildColorRow();render();

async function exportPDF(){
  const btn=document.getElementById('pdf-btn');
  btn.textContent='⏳ generuji…';btn.disabled=true;
  try{
    // Dynamicky načti knihovny
    if(!window.html2canvas){
      await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});
    }
    if(!window.jspdf){
      await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});
    }
    const {jsPDF}=window.jspdf;
    // A4 landscape
    const pdf=new jsPDF({orientation:'landscape',unit:'px',format:[1122,794],hotfixes:['px_scaling']});
    const W=1122,H=794;

    // Dočasný kontejner pro renderování
    const container=document.createElement('div');
    container.style.cssText=`position:fixed;left:-9999px;top:0;width:${W}px;height:${H}px;overflow:hidden;`;
    document.body.appendChild(container);

    const savedCur=cur;
    for(let i=0;i<slides.length;i++){
      const canvas=document.createElement('div');
      canvas.style.cssText=`width:${W}px;height:${H}px;display:flex;flex-direction:column;justify-content:center;align-items:${i===0?'center':'flex-start'};overflow:hidden;position:relative;background:${slides[i].bg};color:${slides[i].text};`;
      container.innerHTML='';
      container.appendChild(canvas);
      renderSlide(slides[i],canvas,false,i);
      const imgData=await html2canvas(canvas,{scale:1,useCORS:true,backgroundColor:slides[i].bg,width:W,height:H,logging:false});
      if(i>0)pdf.addPage();
      pdf.addImage(imgData.toDataURL('image/jpeg',0.92),'JPEG',0,0,W,H);
    }
    document.body.removeChild(container);
    cur=savedCur;
    pdf.save('prezentace.pdf');
  }catch(err){
    alert('Chyba při generování PDF: '+err.message);
    console.error(err);
  }
  btn.textContent='↓ PDF';btn.disabled=false;
}
</script>
